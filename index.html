<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가온그룹 신입공채 2기 — 상석 매너 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF4D8D;
    --navy: #1A1A2E;
    --navy-mid: #23233A;
    --gold: #FFD166;
    --green: #06D6A0;
    --red: #EF476F;
    --white: #FFFFFF;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,77,141,0.14) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; bottom: -200px; left: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(6,214,160,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 760px; margin: 0 auto;
    padding: 0 20px 80px; position: relative; z-index: 1;
  }

  /* ===== HEADER ===== */
  .header { text-align: center; padding: 56px 0 40px; }
  .header-badge {
    display: inline-block; background: var(--pink); color: white;
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    padding: 6px 16px; border-radius: 100px; margin-bottom: 20px;
  }
  .header h1 {
    font-size: clamp(24px, 5vw, 40px); font-weight: 900;
    line-height: 1.3; margin-bottom: 12px; letter-spacing: -0.3px; color: var(--white);
  }
  .header h1 .accent { color: var(--pink); }
  .header p { color: rgba(255,255,255,0.52); font-size: 14px; line-height: 1.75; }

  /* ===== CARD ===== */
  .card {
    background: var(--navy-mid); border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.07);
    padding: 36px; margin-bottom: 24px;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: linear-gradient(90deg, var(--pink), var(--gold));
  }

  /* ===== SCREENS ===== */
  #screen-name, #screen-quiz, #screen-result { display: none; }

  .name-card { text-align: center; padding: 52px 36px; }
  .name-card .emoji { font-size: 52px; margin-bottom: 18px; display: block; }
  .name-card h2 { font-size: 21px; font-weight: 700; margin-bottom: 8px; }
  .name-card p { color: rgba(255,255,255,0.48); font-size: 14px; margin-bottom: 32px; line-height: 1.75; }

  .input-wrap { margin-bottom: 20px; }
  .input-wrap input {
    width: 100%; background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12); border-radius: 12px;
    padding: 16px 20px; font-size: 17px;
    font-family: 'Noto Sans KR', sans-serif;
    color: white; outline: none; transition: border-color 0.2s; text-align: center;
  }
  .input-wrap input:focus { border-color: var(--pink); }
  .input-wrap input::placeholder { color: rgba(255,255,255,0.28); }

  /* ===== BUTTONS ===== */
  .btn-primary {
    display: block; width: 100%;
    background: linear-gradient(135deg, var(--pink), #c2185b);
    color: white; border: none; border-radius: 12px;
    padding: 16px 40px; font-size: 16px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(255,77,141,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,77,141,0.42); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: rgba(255,255,255,0.07); color: white;
    border: 1px solid rgba(255,255,255,0.13); border-radius: 12px;
    padding: 12px 28px; font-size: 14px; font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: background 0.2s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.13); }

  /* ===== PROGRESS ===== */
  .progress-bar-wrap { margin-bottom: 32px; }
  .progress-info {
    display: flex; justify-content: space-between;
    font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.42); margin-bottom: 10px;
  }
  .progress-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 100px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--pink), var(--gold));
    border-radius: 100px; transition: width 0.4s ease;
  }

  .quiz-q-num {
    font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
    color: var(--pink); text-transform: uppercase; margin-bottom: 10px;
  }
  .quiz-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
  .quiz-desc { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 28px; line-height: 1.75; }

  /* ===== DIAGRAM ===== */
  .diagram-wrap {
    background: rgba(255,255,255,0.03); border-radius: 12px;
    padding: 24px; margin-bottom: 28px; border: 1px solid rgba(255,255,255,0.06);
  }
  .diagram-label { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; }
  .diagram-svg { width: 100%; max-width: 340px; margin: 0 auto; display: block; }

  /* ===== RANK LIST ===== */
  .rank-section { margin-bottom: 24px; }
  .rank-label {
    font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.52);
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .rank-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
  .rank-list { display: flex; flex-direction: column; gap: 10px; list-style: none; }

  .rank-item {
    display: flex; align-items: center; gap: 14px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 14px 16px; cursor: grab;
    transition: background 0.15s, border-color 0.15s;
    user-select: none; -webkit-user-select: none; touch-action: none;
  }
  .rank-item:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,77,141,0.27); }
  .rank-item.dragging { opacity: 0.35; cursor: grabbing; }
  .rank-item.drag-over { border-color: var(--pink); background: rgba(255,77,141,0.1); }

  .rank-pos {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--pink), #c2185b);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 900; color: white; flex-shrink: 0;
  }
  .rank-item-label { flex: 1; font-size: 15px; font-weight: 500; line-height: 1.4; }
  .rank-handle { color: rgba(255,255,255,0.2); font-size: 18px; }

  /* ===== REASON ===== */
  .reason-section { margin-bottom: 28px; }
  .reason-label {
    font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.52);
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .reason-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
  textarea {
    width: 100%; background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.09); border-radius: 12px;
    padding: 16px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
    color: white; resize: vertical; min-height: 90px;
    outline: none; transition: border-color 0.2s; line-height: 1.75;
  }
  textarea:focus { border-color: var(--pink); }
  textarea::placeholder { color: rgba(255,255,255,0.22); }

  .quiz-nav { display: flex; gap: 12px; margin-top: 4px; }

  /* ===== RESULT ===== */
  .result-header { text-align: center; padding: 40px 0 32px; }
  .result-emoji { font-size: 64px; display: block; margin-bottom: 16px; }
  .result-name { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.38); margin-bottom: 8px; }
  .result-title { font-size: 24px; font-weight: 900; margin-bottom: 8px; letter-spacing: -0.3px; }
  .score-display {
    display: inline-flex; align-items: baseline; gap: 4px;
    background: rgba(255,77,141,0.12); border: 1px solid rgba(255,77,141,0.26);
    border-radius: 100px; padding: 10px 28px; margin: 16px 0;
  }
  .score-num { font-size: 42px; font-weight: 900; color: var(--pink); }
  .score-denom { font-size: 18px; color: rgba(255,255,255,0.38); }

  .result-list { display: flex; flex-direction: column; gap: 20px; }
  .result-item { padding: 28px; }
  .result-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .result-item-title { font-size: 16px; font-weight: 700; line-height: 1.4; }
  .result-badge { font-size: 12px; font-weight: 700; padding: 4px 14px; border-radius: 100px; white-space: nowrap; }
  .result-badge.correct { background: rgba(6,214,160,0.13); color: var(--green); border: 1px solid rgba(6,214,160,0.26); }
  .result-badge.incorrect { background: rgba(239,71,111,0.13); color: var(--red); border: 1px solid rgba(239,71,111,0.26); }

  .answer-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 480px) { .answer-compare { grid-template-columns: 1fr; } }

  .answer-box { border-radius: 10px; padding: 16px; }
  .answer-box.user-ans { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); }
  .answer-box.correct-ans { background: rgba(6,214,160,0.06); border: 1px solid rgba(6,214,160,0.17); }
  .answer-box-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; color: rgba(255,255,255,0.36); }
  .answer-box.correct-ans .answer-box-label { color: var(--green); }

  .rank-sequence { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .rank-seq-item { background: rgba(255,255,255,0.07); border-radius: 8px; padding: 5px 10px; font-size: 12px; font-weight: 500; }
  .answer-box.correct-ans .rank-seq-item { background: rgba(6,214,160,0.11); color: var(--green); }
  .rank-seq-arrow { color: rgba(255,255,255,0.26); font-size: 11px; }

  .reason-display {
    background: rgba(255,255,255,0.03); border-left: 3px solid var(--pink);
    border-radius: 0 8px 8px 0; padding: 12px 16px;
    font-size: 14px; color: rgba(255,255,255,0.55); line-height: 1.75; margin-top: 4px;
  }
  .reason-display-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.27); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .result-explain {
    margin-top: 12px; background: rgba(255,209,102,0.05);
    border: 1px solid rgba(255,209,102,0.13); border-radius: 10px;
    padding: 14px 16px; font-size: 14px; color: rgba(255,255,255,0.58); line-height: 1.75;
  }
  .result-explain strong { color: var(--gold); }

  /* ===== ADMIN ===== */
  .admin-section {
    margin-top: 32px; padding: 24px; border-radius: var(--radius);
    background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.09); text-align: center;
  }
  .admin-title { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.2); margin-bottom: 16px; }
  .admin-input-wrap { display: flex; gap: 10px; max-width: 340px; margin: 0 auto 12px; }
  .admin-input-wrap input {
    flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
    border-radius: 8px; padding: 10px 14px; font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif; color: white; outline: none;
  }
  .admin-input-wrap input:focus { border-color: var(--gold); }
  .btn-admin {
    background: rgba(255,209,102,0.12); color: var(--gold);
    border: 1px solid rgba(255,209,102,0.27); border-radius: 8px;
    padding: 10px 18px; font-size: 13px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif; cursor: pointer; white-space: nowrap; transition: background 0.2s;
  }
  .btn-admin:hover { background: rgba(255,209,102,0.22); }
  .admin-msg { font-size: 12px; color: rgba(255,255,255,0.27); margin-top: 6px; }
  .admin-msg.error { color: var(--red); }
  .admin-msg.success { color: var(--green); }

  /* ===== LOADING ===== */
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(26,26,46,0.82);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .loading-overlay.show { opacity: 1; pointer-events: all; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,77,141,0.22); border-top-color: var(--pink);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy-mid); border: 1px solid rgba(255,255,255,0.1);
    color: white; padding: 12px 24px; border-radius: 100px;
    font-size: 14px; font-weight: 500; z-index: 998;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.32);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .mt-16 { margin-top: 16px; }
  .text-center { text-align: center; }
  @media (max-width: 600px) {
    .card { padding: 24px 18px; }
    .name-card { padding: 36px 18px; }
    .result-item-header { flex-wrap: wrap; gap: 8px; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading"><div class="spinner"></div></div>

<!-- SCREEN 1: NAME -->
<div id="screen-name">
  <div class="container">
    <div class="header">
      <span class="header-badge">가온그룹 신입공채 2기</span>
      <h1>사회생활 <span class="accent">매너</span> 퀴즈</h1>
      <p>상석·말석 예절을 얼마나 알고 있나요?<br>그림을 보고 올바른 순서를 맞춰보세요.</p>
    </div>
    <div class="card name-card">
      <span class="emoji">👋</span>
      <h2>먼저 이름을 입력해 주세요</h2>
      <p>제출 내역은 이름과 함께 기록됩니다.<br>정직하게 입력해 주세요 :)</p>
      <div class="input-wrap">
        <input type="text" id="input-name" placeholder="홍길동" maxlength="20" autocomplete="off">
      </div>
      <button class="btn-primary" onclick="startQuiz()">퀴즈 시작하기 →</button>
    </div>
  </div>
</div>

<!-- SCREEN 2: QUIZ -->
<div id="screen-quiz">
  <div class="container">
    <div class="header" style="padding: 40px 0 28px;">
      <span class="header-badge">가온그룹 신입공채 2기</span>
      <h1>상석 <span class="accent">매너</span> 퀴즈</h1>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-info">
        <span id="progress-label">문항 1 / 4</span>
        <span id="user-label-top"></span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:25%"></div></div>
    </div>
    <div class="card">
      <div class="quiz-q-num" id="q-num">Question 01</div>
      <div class="quiz-title" id="q-title"></div>
      <div class="quiz-desc" id="q-desc"></div>
      <div class="diagram-wrap">
        <div class="diagram-label">📐 상황 도면</div>
        <div id="q-diagram"></div>
      </div>
      <div class="rank-section">
        <div class="rank-label">🏆 상석부터 말석 순으로 드래그하여 순서를 정해주세요</div>
        <ul class="rank-list" id="rank-list"></ul>
      </div>
      <div class="reason-section">
        <div class="reason-label">✏️ 그렇게 생각한 이유를 적어주세요</div>
        <textarea id="reason-input" placeholder="예) 출입문에서 가장 멀고 상대방을 잘 볼 수 있는 자리이기 때문입니다..." rows="4"></textarea>
      </div>
      <div class="quiz-nav">
        <button class="btn-secondary" id="btn-prev" onclick="prevQ()">← 이전</button>
        <button class="btn-primary" id="btn-next" onclick="nextQ()">다음 →</button>
      </div>
    </div>
  </div>
</div>

<!-- SCREEN 3: RESULT -->
<div id="screen-result">
  <div class="container">
    <div class="result-header">
      <span class="result-emoji" id="result-emoji">🎉</span>
      <div class="result-name" id="result-name-display"></div>
      <div class="result-title" id="result-title"></div>
      <div class="score-display">
        <span class="score-num" id="score-num">0</span>
        <span class="score-denom" id="score-denom">/ 4</span>
      </div>
    </div>
    <div class="result-list" id="result-list"></div>
    <div class="admin-section">
      <div class="admin-title">🔒 관리자 전용</div>
      <div class="admin-input-wrap">
        <input type="password" id="admin-pw" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')adminDownload()">
        <button class="btn-admin" onclick="adminDownload()">CSV 다운로드</button>
      </div>
      <div class="admin-msg" id="admin-msg"></div>
    </div>
    <div class="mt-16 text-center">
      <button class="btn-secondary" onclick="restart()">↩ 다시 도전하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
const SUPABASE_URL = 'https://mrdmywosqzaqukdfvbzv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yZG15d29zcXphcXVrZGZ2Ynp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzIzNTksImV4cCI6MjA4OTU0ODM1OX0.D2PKVx9cqyAg-qIpKdtUX9z9AwdjDwNgo6Nsyy4vdNM';

async function sbInsert(data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/quiz_results`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(await res.text());
}

async function sbSelect() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/quiz_results?select=*&order=submitted_at.asc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });

  return res.json();
}

    <circle cx="120" cy="100" r="30" fill="rgba(255,77,141,0.1)" stroke="rgba(255,77,141,0.36)" stroke-width="1.5"/>

// ===== STATE =====
let userName = '', currentQ = 0, answers = [], dragSrc = null, touchDragSrc = null;

function initAnswers() {
  answers = QUESTIONS.map(q => ({ order: q.seats.map((_, i) => i), reason: '' }));
}

// ===== SCREENS =====
function show(id) {
  ['screen-name','screen-quiz','screen-result'].forEach(s => document.getElementById(s).style.display = 'none');
  document.getElementById(id).style.display = 'block';
  window.scrollTo(0, 0);
}
function showLoading(v) { document.getElementById('loading').classList.toggle('show', v); }

function startQuiz() {
  const n = document.getElementById('input-name').value.trim();
  if (!n) { showToast('이름을 입력해 주세요 😊'); return; }
  userName = n; initAnswers(); currentQ = 0;
  show('screen-quiz'); renderQ();
}

function restart() {
  userName = ''; currentQ = 0; initAnswers();
  document.getElementById('input-name').value = '';
  show('screen-name');
}

// ===== QUIZ =====
function renderQ() {
  const q = QUESTIONS[currentQ], total = QUESTIONS.length;
  document.getElementById('progress-label').textContent = `문항 ${currentQ+1} / ${total}`;
  document.getElementById('user-label-top').textContent = `👤 ${userName}`;
  document.getElementById('progress-fill').style.width = `${((currentQ+1)/total)*100}%`;
  document.getElementById('q-num').textContent = `Question ${String(currentQ+1).padStart(2,'0')}`;
  document.getElementById('q-title').textContent = q.title;
  document.getElementById('q-desc').textContent = q.desc;
  document.getElementById('q-diagram').innerHTML = DIAGRAMS[q.diagramId];
  renderRankList();
  document.getElementById('reason-input').value = answers[currentQ].reason;
  document.getElementById('btn-prev').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').textContent = currentQ === total-1 ? '제출하기 ✓' : '다음 →';
}

function renderRankList() {
  const q = QUESTIONS[currentQ], order = answers[currentQ].order;
  const list = document.getElementById('rank-list');
  list.innerHTML = '';
  order.forEach((seatIdx, pos) => {
    const li = document.createElement('li');
    li.className = 'rank-item'; li.draggable = true; li.dataset.pos = pos;
    li.innerHTML = `<div class="rank-pos">${pos+1}</div><div class="rank-item-label">${q.seats[seatIdx]}</div><div class="rank-handle">⠿</div>`;
    li.addEventListener('dragstart', e => { dragSrc = pos; setTimeout(() => li.classList.add('dragging'), 0); e.dataTransfer.effectAllowed = 'move'; });
    li.addEventListener('dragend', () => li.classList.remove('dragging'));
    li.addEventListener('dragover', e => { e.preventDefault(); li.classList.add('drag-over'); });
    li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
    li.addEventListener('drop', e => { e.preventDefault(); li.classList.remove('drag-over'); if (dragSrc !== null && dragSrc !== pos) swapOrder(dragSrc, pos); });
    li.addEventListener('touchstart', onTouchStart, { passive: true });
    li.addEventListener('touchmove', onTouchMove, { passive: false });
    li.addEventListener('touchend', onTouchEnd);
    list.appendChild(li);
  });
}

function swapOrder(from, to) {
  const o = [...answers[currentQ].order];
  const [m] = o.splice(from, 1); o.splice(to, 0, m);
  answers[currentQ].order = o; dragSrc = null; renderRankList();
}

function onTouchStart(e) { touchDragSrc = parseInt(e.currentTarget.dataset.pos); e.currentTarget.classList.add('dragging'); }
function onTouchMove(e) {
  e.preventDefault();
  const t = e.touches[0], el = document.elementFromPoint(t.clientX, t.clientY);
  document.querySelectorAll('.rank-item').forEach(i => i.classList.remove('drag-over'));
  const target = el ? el.closest('.rank-item') : null;
  if (target && target !== e.currentTarget) target.classList.add('drag-over');
}
function onTouchEnd(e) {
  const t = e.changedTouches[0], el = document.elementFromPoint(t.clientX, t.clientY);
  const target = el ? el.closest('.rank-item') : null;
  document.querySelectorAll('.rank-item').forEach(i => { i.classList.remove('dragging'); i.classList.remove('drag-over'); });
  if (target && touchDragSrc !== null) { const tp = parseInt(target.dataset.pos); if (tp !== touchDragSrc) swapOrder(touchDragSrc, tp); }
  touchDragSrc = null;
}

function saveReason() { answers[currentQ].reason = document.getElementById('reason-input').value.trim(); }
function prevQ() { saveReason(); if (currentQ > 0) { currentQ--; renderQ(); } }
function nextQ() {
  saveReason();
  if (!answers[currentQ].reason) { showToast('이유를 적어주세요 ✏️'); return; }
  if (currentQ < QUESTIONS.length - 1) { currentQ++; renderQ(); } else { submitQuiz(); }
}

// ===== SUBMIT =====
function calcScore() {
  return QUESTIONS.reduce((s, q, i) => s + (JSON.stringify(answers[i].order) === JSON.stringify(q.correctOrder) ? 1 : 0), 0);
}

async function submitQuiz() {
  saveReason();
  showLoading(true);
  try {
    const total = QUESTIONS.length;
    const payload = { name: userName, score: calcScore(), total };
    QUESTIONS.forEach((q, i) => {
      const key = `q${i+1}`;
      payload[`${key}_user_order`] = answers[i].order.map(si => q.seats[si]).join(' → ');
      payload[`${key}_correct`] = JSON.stringify(answers[i].order) === JSON.stringify(q.correctOrder);
      payload[`${key}_reason`] = answers[i].reason;
    });
    await sbInsert(payload);
  } catch(err) {
    console.error('저장 오류:', err);
    showToast('저장 중 오류가 발생했습니다. 결과는 확인하실 수 있습니다.');
  } finally {
    showLoading(false);
    renderResult(); show('screen-result');
  }
}

  document.getElementById('score-denom').textContent = `/ ${total}`;

  const list = document.getElementById('result-list');
  list.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const isCorrect = JSON.stringify(answers[i].order) === JSON.stringify(q.correctOrder);
    const card = document.createElement('div');
    card.className = 'card result-item';
    card.innerHTML = `
      <div class="result-item-header">
        <div class="result-item-title">Q${i+1}. ${q.title}</div>
        <div class="result-badge ${isCorrect ? 'correct' : 'incorrect'}">${isCorrect ? '✓ 정답' : '✗ 오답'}</div>
      </div>
      <div class="answer-compare">
        <div class="answer-box user-ans">
          <div class="answer-box-label">내 답변</div>
          <div class="rank-sequence">${answers[i].order.map((si, pi) =>
            `${pi > 0 ? '<span class="rank-seq-arrow">→</span>' : ''}<span class="rank-seq-item">${pi+1}석: ${q.seats[si].split(' ')[0]}</span>`).join('')}</div>
        </div>
        <div class="answer-box correct-ans">
          <div class="answer-box-label">정답</div>
          <div class="rank-sequence">${q.correctOrder.map((si, pi) =>
            `${pi > 0 ? '<span class="rank-seq-arrow" style="color:rgba(6,214,160,0.36)">→</span>' : ''}<span class="rank-seq-item">${pi+1}석: ${q.seats[si].split(' ')[0]}</span>`).join('')}</div>
        </div>
      </div>
      <div>
        <div class="reason-display-label">내가 쓴 이유</div>
        <div class="reason-display">${answers[i].reason || '(작성 없음)'}</div>
      </div>
      <div class="result-explain"><strong>💡 해설</strong><br>${q.explanation}</div>`;
    list.appendChild(card);
  });
}

// ===== ADMIN =====
async function adminDownload() {
  const pw = document.getElementById('admin-pw').value;
  const msg = document.getElementById('admin-msg');
  if (pw !== ADMIN_PW) { msg.textContent = '비밀번호가 올바르지 않습니다.'; msg.className = 'admin-msg error'; return; }
  msg.textContent = '불러오는 중...'; msg.className = 'admin-msg';
  showLoading(true);
  try {
    const results = await sbSelect();
    if (!results.length) { msg.textContent = '저장된 데이터가 없습니다.'; msg.className = 'admin-msg error'; return; }
    const headers = [
      '이름','제출시간','점수','총문항',
      '문항1-답변','문항1-정답여부','문항1-이유',
      '문항2-답변','문항2-정답여부','문항2-이유',
      '문항3-답변','문항3-정답여부','문항3-이유',
      '문항4-답변','문항4-정답여부','문항4-이유'
    ];
    const rows = results.map(r => [
      `"${r.name}"`, r.submitted_at, r.score, r.total,
      `"${r.q1_user_order||''}"`, r.q1_correct ? '정답' : '오답', `"${r.q1_reason||''}"`,
      `"${r.q2_user_order||''}"`, r.q2_correct ? '정답' : '오답', `"${r.q2_reason||''}"`,
      `"${r.q3_user_order||''}"`, r.q3_correct ? '정답' : '오답', `"${r.q3_reason||''}"`,
      `"${r.q4_user_order||''}"`, r.q4_correct ? '정답' : '오답', `"${r.q4_reason||''}"`
    ].join(','));
    const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `가온그룹_상석퀴즈_${new Date().toLocaleDateString('ko-KR').replace(/\./g,'').replace(/ /g,'-')}.csv`;
    a.click(); URL.revokeObjectURL(url);
    msg.textContent = `✓ ${results.length}건 다운로드 완료`; msg.className = 'admin-msg success';
  } catch(err) {
    msg.textContent = '다운로드 실패: ' + err.message; msg.className = 'admin-msg error';
  } finally { showLoading(false); }
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

// ===== INIT =====
document.getElementById('input-name').addEventListener('keydown', e => { if (e.key === 'Enter') startQuiz(); });
show('screen-name');
